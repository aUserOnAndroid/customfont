name: Build and Release Geode Mod

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .geode
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Auto-generated build from commit ${{ github.sha }}.
          prerelease: true
          make_latest: false
          files: ${{ steps.build.outputs.build-output }}
