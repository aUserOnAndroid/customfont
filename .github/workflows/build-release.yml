name: Build and Release Geode Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .geode
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64

      - name: Show build output path
        run: |
          echo "build-output=${{ steps.build.outputs.build-output }}"
          ls -lah ${{ steps.build.outputs.build-output }}

      - name: Upload build artifact (Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: geode-${{ github.sha }}
          path: ${{ steps.build.outputs.build-output }}
          if-no-files-found: error

      - name: Publish GitHub Release (per commit)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          body: |
            Auto-generated .geode build for commit ${{ github.sha }}.
          prerelease: true
          files: ${{ steps.build.outputs.build-output }}
